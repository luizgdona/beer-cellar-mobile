name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Type-check · Lint · Audit · Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js 24
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Security audit
        # Mobile: threshold=critical — tar/xmldom high vulns are server-side attack vectors not exploitable in a mobile app
        run: npm audit --audit-level=critical

      - name: Test
        run: npm test
        env:
          EXPO_PUBLIC_API_URL: http://localhost:3001/api/v1
